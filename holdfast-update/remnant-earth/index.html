<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Holdfast: A Better World</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500&family=Crimson+Pro:ital,wght@0,300;1,300;1,400&display=swap');

    :root { --parchment: #e8d5a8; }
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #080401;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
      font-family: 'Crimson Pro', serif;
    }

    #game-wrap {
      position: relative;
      width: 800px;
      height: 560px;
      overflow: hidden;
      box-shadow: 0 0 80px rgba(200,120,30,0.12), 0 0 200px rgba(0,0,0,0.9);
    }

    #game { position: absolute; inset: 0; z-index: 10; }
    #game canvas {
      position: absolute !important;
      top: 0 !important; left: 0 !important;
      background: transparent !important;
    }

    #scene-bg {
      position: absolute;
      inset: 0; width: 100%; height: 100%;
      z-index: 1;
    }

    #lightshaft {
      position: absolute;
      left: 172px; top: 78px;
      width: 110px; height: 340px;
      background: linear-gradient(175deg, rgba(255,210,120,0.13) 0%, rgba(255,190,80,0.07) 40%, rgba(255,160,40,0.03) 70%, transparent 100%);
      transform: skewX(-4deg);
      pointer-events: none; z-index: 3;
      filter: blur(8px);
      animation: shaftBreath 7s ease-in-out infinite;
    }
    @keyframes shaftBreath {
      0%,100% { opacity:1; transform:skewX(-4deg) scaleX(1); }
      40%     { opacity:0.8; transform:skewX(-6deg) scaleX(0.93); }
      70%     { opacity:0.95; transform:skewX(-3deg) scaleX(1.04); }
    }

    #lanternglow {
      position: absolute;
      left: 340px; top: 10px;
      width: 120px; height: 120px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255,160,30,0.18) 0%, transparent 70%);
      pointer-events: none; z-index: 3;
      animation: lanternPulse 3s ease-in-out infinite;
      filter: blur(6px);
    }
    @keyframes lanternPulse {
      0%,100% { opacity:1; transform:scale(1); }
      50%     { opacity:0.7; transform:scale(0.9); }
    }

    .mote {
      position: absolute; border-radius: 50%;
      background: rgba(255,210,130,0.7);
      pointer-events: none; z-index: 4;
      animation: floatMote linear infinite;
    }
    @keyframes floatMote {
      0%   { opacity:0; transform:translate(0,0) scale(0.5); }
      15%  { opacity:0.8; }
      85%  { opacity:0.5; }
      100% { opacity:0; transform:translate(var(--dx),var(--dy)) scale(1.2); }
    }

    #grain {
      position: absolute; inset: 0; opacity: 0.045;
      pointer-events: none; z-index: 15;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size: 200px 200px;
    }

    #vignette {
      position: absolute; inset: 0;
      background: radial-gradient(ellipse 75% 65% at 48% 52%, transparent 25%, rgba(6,3,1,0.55) 75%, rgba(4,2,0,0.82) 100%);
      pointer-events: none; z-index: 14;
    }

    #dialogue {
      position: absolute;
      bottom: 16px; left: 16px; right: 16px;
      background: linear-gradient(135deg, rgba(10,6,2,0.94), rgba(18,10,4,0.94));
      border: 1px solid rgba(180,130,50,0.35);
      border-left: 3px solid rgba(180,130,50,0.6);
      padding: 14px 18px 12px;
      color: var(--parchment);
      font-size: 15.5px; font-style: italic; line-height: 1.75;
      display: none; z-index: 40; pointer-events: none;
      box-shadow: 0 -2px 30px rgba(0,0,0,0.6);
    }
    #dialogue::before {
      content:''; position:absolute; top:-1px; left:-1px;
      width:12px; height:12px;
      border-top:2px solid rgba(196,147,90,0.7);
      border-left:2px solid rgba(196,147,90,0.7);
    }
    #dialogue::after {
      content:''; position:absolute; bottom:-1px; right:-1px;
      width:12px; height:12px;
      border-bottom:2px solid rgba(196,147,90,0.7);
      border-right:2px solid rgba(196,147,90,0.7);
    }
    #dlg-speaker {
      font-family:'Cinzel',serif; font-style:normal;
      font-size:9px; letter-spacing:0.22em;
      color:#c4935a; text-transform:uppercase; margin-bottom:6px;
    }
    #dlg-prompt {
      font-size:10px; font-style:normal;
      color:rgba(196,147,90,0.4);
      text-align:right; margin-top:7px; letter-spacing:0.1em;
    }

    #tasklog {
      position: absolute; top:14px; left:14px;
      background: rgba(8,5,2,0.78);
      border: 1px solid rgba(160,110,40,0.25);
      border-left: 2px solid rgba(160,110,40,0.5);
      padding: 10px 14px; z-index:40;
      pointer-events:none; min-width:205px;
    }
    .tl-head {
      font-family:'Cinzel',serif; font-size:8px;
      letter-spacing:0.25em; color:rgba(180,120,40,0.7);
      text-transform:uppercase; margin-bottom:8px;
      padding-bottom:5px; border-bottom:1px solid rgba(160,110,40,0.18);
    }
    .ti {
      display:flex; align-items:center; gap:8px;
      font-family:'Crimson Pro',serif; font-size:12.5px;
      color:#b89858; margin-bottom:5px; transition:all 0.6s ease;
    }
    .ti.done { color:rgba(160,120,50,0.3); text-decoration:line-through; }
    .td { width:5px; height:5px; border-radius:50%; background:#a07838; flex-shrink:0; transition:background 0.6s; }
    .ti.done .td { background:rgba(160,120,50,0.25); }

    #controls {
      position:absolute; top:14px; right:14px;
      background:rgba(8,5,2,0.72);
      border:1px solid rgba(160,110,40,0.18);
      padding:9px 13px; font-family:'Crimson Pro',serif;
      font-size:11px; color:rgba(170,135,70,0.5);
      letter-spacing:0.05em; line-height:2; z-index:40; pointer-events:none;
    }
    #controls b {
      font-family:'Cinzel',serif; font-style:normal;
      font-size:9px; font-weight:400; color:rgba(196,147,90,0.75);
    }

    .zone-indicator {
      position:absolute; font-family:'Cinzel',serif;
      font-size:8.5px; letter-spacing:0.15em; color:#c4935a;
      background:rgba(8,5,2,0.82); border:1px solid rgba(196,147,90,0.35);
      padding:3px 8px; pointer-events:none; z-index:35;
      opacity:0; transition:opacity 0.25s ease;
      transform:translateX(-50%); white-space:nowrap;
    }

    #ambient {
      position:absolute; bottom:105px; left:50%; transform:translateX(-50%);
      font-family:'Crimson Pro',serif; font-style:italic; font-size:13px;
      color:rgba(210,175,100,0.55); letter-spacing:0.07em;
      white-space:nowrap; pointer-events:none; z-index:38;
      opacity:0; transition:opacity 1.8s ease;
      text-shadow:0 0 20px rgba(180,100,20,0.4);
    }

    #wakeup {
      position:absolute; inset:0; background:#060301;
      z-index:50; pointer-events:none;
      animation:fadeWake 3s ease-out 0.3s forwards;
    }
    @keyframes fadeWake { 0%{opacity:1;} 100%{opacity:0;} }
  </style>
</head>
